name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Check artifacts
        run: npm run generate:check

      - name: Build checksums
        run: |
          find artifacts -type f -name '*.json' -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.json
            artifacts/by-chain/*.json
            SHA256SUMS
