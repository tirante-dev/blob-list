name: Publish Generated Data

on:
  push:
    branches:
      - main
  schedule:
    # Weekly Chainlist snapshot refresh.
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-generated-data
  cancel-in-progress: true

jobs:
  publish:
    name: publish generated data
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Reuse the published snapshot so fetch-chainlist keeps its source
      # metadata when the vendored Chainlist data is unchanged upstream.
      - name: Seed published Chainlist snapshot
        run: |
          if git fetch origin generated-data; then
            git checkout FETCH_HEAD -- data/chainlist/snapshot.json || true
            git reset -q
          fi

      - name: Fetch Chainlist snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run fetch-chainlist

      - name: Generate artifacts
        run: npm run generate

      - name: Validate registry
        run: npm run validate

      - name: Check generated artifacts
        run: npm run generate:check

      - name: Publish generated-data branch
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          published=""
          if git fetch origin generated-data; then
            published="$(git rev-parse FETCH_HEAD)"
          fi

          # Build a single-commit orphan branch that contains only the
          # published dataset. History lives in releases and in main.
          # checkout --orphan (not switch --orphan): switch clears ignored
          # files from the working tree, deleting the generated data.
          git checkout -q --orphan publish-stage
          git rm -r -q --cached .
          cat > README.md <<'EOF'
          # blob-list generated data

          This branch is machine-published by the `Publish Generated Data`
          workflow. Do not edit it by hand and do not open pull requests
          against it; every publish force-replaces the branch contents.

          - `artifacts/` — generated registry artifacts for consumers.
          - `data/chainlist/snapshot.json` — the pinned Chainlist snapshot
            the artifacts were generated from.

          Stable URLs:

          - `https://raw.githubusercontent.com/tirante-dev/blob-list/generated-data/artifacts/registry.json`
          - `https://raw.githubusercontent.com/tirante-dev/blob-list/generated-data/artifacts/by-chain/{submission_chain}.json`

          Versioned release assets with checksums are published at
          <https://github.com/tirante-dev/blob-list/releases>.
          EOF
          git add -f README.md artifacts data/chainlist/snapshot.json
          git commit -q -m "chore: publish generated data from ${source_sha}"

          if [ -n "$published" ] && git diff --quiet "$published" HEAD -- artifacts data/chainlist/snapshot.json; then
            echo "Published generated data already matches ${source_sha}."
            exit 0
          fi

          git push --force origin HEAD:refs/heads/generated-data
          echo "Published generated data from \`${source_sha}\` to \`generated-data\`." >> "$GITHUB_STEP_SUMMARY"
