name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check formatting
        run: npm run format:check

      - name: Lint Markdown
        run: npm run lint:md

      - name: Reject committed generated artifacts
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # --diff-filter=d ignores deletions so removing previously committed
          # artifacts is allowed; only added or modified artifacts are rejected.
          committed_artifacts="$(git diff --name-only --diff-filter=d "$BASE_SHA" -- artifacts)"
          if [ -n "$committed_artifacts" ]; then
            echo "::error::Generated artifacts are produced by CI and published on GitHub Releases. Remove committed artifacts/ changes from this PR."
            echo "$committed_artifacts"
            exit 1
          fi

          if ! git diff --quiet "$BASE_SHA" -- entities && ! git diff --quiet "$BASE_SHA" -- data/chainlist/snapshot.json; then
            echo "::error::Do not commit data/chainlist/snapshot.json changes in attribution PRs. CI regenerates the snapshot for validation, and the scheduled Chainlist refresh keeps the vendored lockfile current."
            git diff --name-only "$BASE_SHA" -- data/chainlist/snapshot.json
            exit 1
          fi

      - name: Fetch projected Chainlist snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run fetch-chainlist

      - name: Generate artifacts
        run: npm run generate

      - name: Validate registry
        run: npm run validate

      - name: Check generated artifacts
        run: npm run generate:check
