name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check formatting
        run: npm run format:check

      - name: Lint Markdown
        run: npm run lint:md

      - name: Reject committed generated data
        if: github.event_name == 'pull_request'
        run: |
          if git ls-tree -r --name-only HEAD -- artifacts data/chainlist/snapshot.json | grep -q .; then
            echo "::error::Generated data is machine-published to the generated-data branch. Remove committed artifacts/ and data/chainlist/snapshot.json files from this PR; CI posts the projected generated-data diff as a comment."
            git ls-tree -r --name-only HEAD -- artifacts data/chainlist/snapshot.json
            exit 1
          fi

      # Resolve the published dataset to diff against, and reuse its snapshot
      # so fetch-chainlist keeps source metadata when vendored data is
      # unchanged upstream. Falls back to the empty tree before the first
      # publish.
      - name: Resolve published generated data
        id: published
        run: |
          if git fetch origin generated-data; then
            echo "ref=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
            git checkout FETCH_HEAD -- data/chainlist/snapshot.json || true
            git reset -q
          else
            echo "No published generated-data branch yet; comparing against the empty tree."
            echo "ref=$(git hash-object -t tree /dev/null)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch projected Chainlist snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run fetch-chainlist

      - name: Generate projected artifacts
        run: npm run generate

      - name: Validate registry
        run: npm run validate

      - name: Check generated artifacts
        run: npm run generate:check

      - name: Capture projected generated-data diffs
        if: github.event_name == 'pull_request'
        env:
          PUBLISHED_REF: ${{ steps.published.outputs.ref }}
        run: |
          git add -f -A artifacts data/chainlist/snapshot.json
          git diff --cached "$PUBLISHED_REF" --no-ext-diff --unified=3 -- artifacts > artifact.diff
          git diff --cached "$PUBLISHED_REF" --no-ext-diff --unified=3 -- data/chainlist/snapshot.json > chainlist.diff

      - name: Build generated-data diff comment
        if: github.event_name == 'pull_request'
        env:
          PUBLISHED_SHA: ${{ steps.published.outputs.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/build-artifact-diff-comment.js artifact.diff generated-data-comment.md chainlist.diff

      - name: Upload projected generated-data diffs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: projected-generated-diffs
          path: |
            artifact.diff
            chainlist.diff

      - name: Comment projected generated-data diff
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- blob-list-artifact-diff -->";
            const body = fs.readFileSync("generated-data-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
