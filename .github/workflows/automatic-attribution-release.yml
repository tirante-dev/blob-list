name: Automatic Attribution Release

on:
  push:
    branches:
      - main
    paths:
      - "entities/*.yaml"
      - "entities/*.yml"
      - "entities/**/*.yaml"
      - "entities/**/*.yml"

permissions:
  contents: write

concurrency:
  group: automatic-attribution-release
  cancel-in-progress: false

jobs:
  release:
    name: release new attributions
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect new attribution claims
        id: attributions
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA")"
          fi

          node tools/release/detect-new-attributions.js "$BASE_SHA" "$HEAD_SHA"

      - name: Generate artifacts
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        run: npm run generate

      - name: Validate
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        run: npm run validate

      - name: Check artifacts
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        run: npm run generate:check

      - name: Build checksums
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        run: |
          find artifacts -type f -name '*.json' -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > SHA256SUMS

      - name: Compute release version
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        id: version
        run: |
          git fetch --tags --force
          node tools/release/next-version.js minor

      - name: Publish GitHub release
        if: ${{ steps.attributions.outputs.has_new_attributions == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            Automatic release for new attribution claim(s) merged to `main`.

            ${{ steps.attributions.outputs.summary }}
          files: |
            artifacts/*.json
            artifacts/by-chain/*.json
            SHA256SUMS
